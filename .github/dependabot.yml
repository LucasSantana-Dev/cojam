version: 2
updates:
  # Go server module
  - package-ecosystem: gomod
    directory: /apps/server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-dependencies:
        patterns:
          - "*"

  # Web (pnpm workspace: root manifest covers apps/web + packages/*)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk bumps into one PR; majors still get their own.
      npm-minor-patch:
        update-types:
          - minor
          - patch
    # Keep @types/node aligned to the Node 22 runtime; do not propose 23+.
    ignore:
      - dependency-name: "@types/node"
        versions: [">=23"]
      # eslint 10 breaks eslint-plugin-react (7.37.5, peer ^9.7 max: crashes on
      # the removed context API). Hold 10+ until the plugin ships support.
      - dependency-name: "eslint"
        versions: [">=10"]

  # GitHub Actions (keeps the SHA-pinned actions current with version-comment PRs)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: these jobs only build/test, so the token needs read-only
# access to repo contents and nothing else.
permissions:
  contents: read

jobs:
  server:
    name: Go server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web exec vitest run
      - run: pnpm --filter web build

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: these jobs only build/test, so the token needs read-only
# access to repo contents and nothing else.
permissions:
  contents: read

# Rapid pushes to the same branch/PR supersede earlier runs; cancel them.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Go server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: ./scripts/check_web_drift.sh
      # Types + lint are documented local gates (AGENTS.md) and must run in CI:
      # the eslint 10 bump passed this job green while breaking `pnpm lint`.
      - run: pnpm --filter web exec tsc --noEmit
      - run: pnpm --filter web lint
      - run: pnpm --filter web exec vitest run
      - run: pnpm --filter web build

  e2e:
    name: Web e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: apps/server/go.mod
          cache-dependency-path: apps/server/go.sum
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm --filter web exec playwright install --with-deps chromium
      # playwright.config.ts starts both the web (:3000) and Go (:8080) servers itself.
      - run: pnpm --filter web exec playwright test --reporter=line

name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

# Least privilege: deploy uses FLY_API_TOKEN (not GITHUB_TOKEN); the job only
# needs to check out the repo. No write scopes on the GitHub token.
permissions:
  contents: read

jobs:
  deploy-server:
    name: Deploy server to Fly.io
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master HEAD
      - name: Deploy server
        run: flyctl deploy --remote-only
        working-directory: apps/server
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-web:
    name: Deploy web to Fly.io
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master HEAD
      # Build from the repo root so the Dockerfile's workspace COPYs resolve
      # (pnpm-workspace.yaml, packages/, apps/web live at the root).
      - name: Deploy web
        run: flyctl deploy --remote-only --config apps/web/fly.toml --dockerfile apps/web/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

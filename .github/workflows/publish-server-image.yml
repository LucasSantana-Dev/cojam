name: Publish server image

# Builds and pushes the Go server image to GHCR so self-managed deployments
# (which pull rather than build) can consume it.
on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - '.github/workflows/publish-server-image.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-server-image
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lucassantana-dev/cojam-server
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: apps/server
          file: apps/server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

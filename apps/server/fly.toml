# Fly.io configuration for CoJam Go server
app = "cojam-server"
primary_region = "gig"

[build]
dockerfile = "Dockerfile"

[env]
# Node name for centrifuge (kept simple for single-node MVP)
NODE_NAME = "cojam-server"

[http_service]
internal_port = 8080
force_https = false

# Readiness check: /readyz is 200 when the process is up and (when DATABASE_URL
# is set) the Postgres pool answers a ping, else 503. Fly stops routing to an
# instance whose database is unreachable, then resumes when it recovers.
[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
path = "/readyz"
protocol = "http"
timeout = "3s"
type = "http"

[vm]
size = "shared-cpu-1x"

# Stop VMs when no traffic to reduce cost
[[auto_stop_machines]]
stops_after = { "days" = 0, "hours" = 1 }

# Restart VMs with incoming traffic
[[auto_start_machines]]
min_machines_running = 0

# Fly.io configuration for Cojam Next.js web app
app = "cojam-web"
primary_region = "gig"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 3000
force_https = false

[[http_service.checks]]
grace_period = "5s"
interval = 15000
method = "GET"
path = "/"
protocol = "http"
timeout = 3000
type = "http"

[vm]
size = "shared-cpu-1x"

# Stop VMs when no traffic to reduce cost
[[auto_stop_machines]]
stops_after = { "days" = 0, "hours" = 1 }

# Restart VMs with incoming traffic
[[auto_start_machines]]
min_machines_running = 0
